<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navigation bar</title>
    <style>
        .navbar{
            background-color: rgb(15, 14, 14);
            border-radius: 13px;
        }
        .navbar ul{
            overflow: auto;
        }
        .navbar li{
            float: left;
            list-style: none;
            margin: 12px 20px;
        }
        .navbar li a{
            padding: 3px 3px;
            text-decoration: none;
            color: bisque;
        }
        .navbar li a:hover{
            color:brown
        }
        .search{
            float: right;
            padding: 13px 75px;
            color: white;
        }
        
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact Us</a></li>
                <div class="search">
                    <input type="text" name="search" placeholder="search this website" id="search">
                </div>
            </ul>
        </nav>
    </header>
</body>
</html>
